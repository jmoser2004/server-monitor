<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --muted: #777;
  --green: #639922;
  --amber: #BA7517;
  --red: #E24B4A;
  --mono: 'Courier New', monospace;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  padding: 12px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
.dot.ok { background: var(--green); }
.hostname { font-size: 20px; font-weight: 500; }
.uptime { font-size: 13px; color: var(--muted); margin-top: 2px; }
.ts { font-size: 13px; color: var(--muted); }

/* ── Top section: CPU + Memory side by side ── */
.top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  flex-shrink: 0;
}
.panel {
  background: var(--bg2);
  border-radius: 10px;
  padding: 14px 16px;
}
.panel-label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.panel-value { font-size: 42px; font-weight: 500; line-height: 1; }
.panel-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }
.bar-wrap { height: 5px; background: var(--bg3); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; background: var(--green); }
.bar.warn { background: var(--amber); }
.bar.crit { background: var(--red); }

/* CPU core grid — 6 cols for 12 cores */
.cpu-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.core { text-align: center; }
.core-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.core-val { font-size: 15px; font-weight: 500; }

/* ── Bottom section: disk / net / procs ── */
.bottom {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  flex: 1;
  min-height: 0;
}
.section {
  background: var(--bg2);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.section-head {
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.section-body { overflow-y: auto; flex: 1; }

.row {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  font-size: 14px;
}
.row:last-child { border-bottom: none; }
.mono { font-family: var(--mono); font-size: 13px; }
.muted { color: var(--muted); }
.val { color: var(--text); font-weight: 500; }

.disk-mount { min-width: 60px; flex-shrink: 0; }
.disk-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.disk-fill { height: 100%; border-radius: 2px; background: var(--green); }
.disk-fill.warn { background: var(--amber); }
.disk-fill.crit { background: var(--red); }
.disk-pct { min-width: 32px; text-align: right; font-size: 13px; color: var(--muted); }

.proc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.proc-stat { min-width: 54px; text-align: right; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="dot" id="dot"></div>
    <div>
      <div class="hostname" id="hostname">System Monitor</div>
      <div class="uptime" id="osinfo">Connecting…</div>
    </div>
  </div>
  <div class="ts" id="tsLabel">—</div>
</div>

<div class="top">
  <!-- CPU panel -->
  <div class="panel">
    <div class="panel-label"><i class="ti ti-cpu"></i> CPU</div>
    <div class="panel-value" id="cpuAvg">—</div>
    <div class="panel-sub" id="cpuSub">—</div>
    <div class="bar-wrap"><div class="bar" id="cpuBar" style="width:0%"></div></div>
    <div class="cpu-grid" id="coreGrid"></div>
  </div>
  <!-- Memory panel -->
  <div class="panel">
    <div class="panel-label"><i class="ti ti-device-desktop-analytics"></i> Memory</div>
    <div class="panel-value" id="memVal">—</div>
    <div class="panel-sub" id="memSub">—</div>
    <div class="bar-wrap"><div class="bar" id="memBar" style="width:0%"></div></div>
  </div>
</div>

<div class="bottom">
  <div class="section">
    <div class="section-head"><i class="ti ti-database"></i> Disk</div>
    <div class="section-body" id="diskList"></div>
  </div>
  <div class="section">
    <div class="section-head"><i class="ti ti-network"></i> Network</div>
    <div class="section-body" id="netList"></div>
  </div>
  <div class="section">
    <div class="section-head"><i class="ti ti-activity"></i> Processes</div>
    <div class="section-body" id="procList"></div>
  </div>
</div>

<script>
function fmtMB(mb) {
  return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : mb + ' MB';
}
function barCls(pct) {
  return pct >= 90 ? 'crit' : pct >= 70 ? 'warn' : '';
}
function render(d) {
  document.getElementById('dot').className = 'dot ok';
  document.getElementById('hostname').textContent = d.system.hostname;
  document.getElementById('osinfo').textContent = d.system.os + ' ' + d.system.version + ' · up ' + d.system.uptime;
  document.getElementById('tsLabel').textContent = new Date(d.timestamp).toLocaleTimeString();

  const cores = d.cpu.core_usage || [];
  const avg = cores.length ? Math.round(cores.reduce((a,b) => a+b,0) / cores.length) : 0;
  document.getElementById('cpuAvg').textContent = avg + '%';
  document.getElementById('cpuSub').textContent = cores.length + ' cores · kernel ' + d.system.kernel;
  const cb = document.getElementById('cpuBar');
  cb.style.width = avg + '%'; cb.className = 'bar ' + barCls(avg);

  document.getElementById('coreGrid').innerHTML = cores.map((p,i) => {
    const pct = Math.round(p);
    return `<div class="core">
      <div class="core-label">c${i}</div>
      <div class="core-val">${pct}%</div>
      <div class="bar-wrap" style="margin-top:3px"><div class="bar ${barCls(pct)}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const mem = d.memory;
  const mp = Math.round(mem.used_percent);
  document.getElementById('memVal').textContent = mp + '%';
  document.getElementById('memSub').textContent = fmtMB(mem.used_mb) + ' used of ' + fmtMB(mem.total_mb);
  const mb = document.getElementById('memBar');
  mb.style.width = mp + '%'; mb.className = 'bar ' + barCls(mp);

  const ifaces = (d.network || []).filter(n => n.recv_mb > 0 || n.sent_mb > 0);
  document.getElementById('netList').innerHTML = ifaces.map(n =>
    `<div class="row">
      <div class="mono" style="flex:1">${n.interface}</div>
      <div class="muted" style="font-size:13px">↓<span class="val"> ${fmtMB(n.recv_mb)}</span></div>
      <div class="muted" style="font-size:13px;margin-left:6px">↑<span class="val"> ${fmtMB(n.sent_mb)}</span></div>
    </div>`
  ).join('');

  document.getElementById('diskList').innerHTML = (d.disks || []).map(dk => {
    const pct = Math.round(dk.used_percent);
    return `<div class="row">
      <div class="disk-mount mono">${dk.mountpoint}</div>
      <div class="disk-bar"><div class="disk-fill ${barCls(pct)}" style="width:${pct}%"></div></div>
      <div class="disk-pct">${pct}%</div>
    </div>`;
  }).join('');

  document.getElementById('procList').innerHTML = (d.processes || []).map(p =>
    `<div class="row">
      <div class="proc-name">${p.name}</div>
      <div class="proc-stat">CPU <span class="val">${p.cpu_percent.toFixed(1)}%</span></div>
      <div class="proc-stat">MEM ${p.mem_percent.toFixed(1)}%</div>
    </div>`
  ).join('');
}

function connect() {
  const url = 'ws://' + location.host + '/ws';
  document.getElementById('osinfo').textContent = 'Connecting to ' + url + '…';
  const ws = new WebSocket(url);
  ws.onopen = () => document.getElementById('osinfo').textContent = 'Connected';
  ws.onmessage = e => { try { render(JSON.parse(e.data)); } catch(err) { console.error(err); } };
  ws.onerror = () => document.getElementById('osinfo').textContent = 'Connection error';
  ws.onclose = () => {
    document.getElementById('dot').className = 'dot';
    document.getElementById('osinfo').textContent = 'Disconnected — retrying in 5s…';
    setTimeout(connect, 5000);
  };
}
connect();
</script>
</body>
</html>
